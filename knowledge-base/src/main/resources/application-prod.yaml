server:
  port: ${SERVER_PORT:8080}

spring:
  servlet:
    multipart:
      max-file-size: 1073741824
      max-request-size: 1073741824
      enabled: true
      file-size-threshold: 0
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:knowledge_base}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    username: ${NEO4J_USERNAME:neo4j}
    password: ${NEO4J_PASSWORD:password}
    enabled: ${NEO4J_ENABLED:true}

  ai:
    zhipuai:
      api-key: ${ZHIPUAI_API_KEY}
      chat:
        options:
          model: glm-z1-flash
          temperature: 0.7
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
        max-document-batch-size: 10000

# 大模型提供商配置: zhipuai 或 ollama
chat:
  model:
    provider: ${CHAT_MODEL_PROVIDER:ollama}
    light-model-provider: ${CHAT_LIGHT_MODEL_PROVIDER:ollama}

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
      database: ${REDIS_DATABASE:0}
      timeout: 5000

# MinIO 配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin123}
  bucket-name: ${MINIO_BUCKET_NAME:knowledge-base}

# springdoc-openapi 生产环境配置
springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}  # 生产环境默认关闭，可通过环境变量开启
    operations-sorter: order
  api-docs:
    enabled: ${API_DOCS_ENABLED:false}

# Knife4j 生产环境配置
knife4j:
  enable: ${KNIFE4J_ENABLED:false}     # 生产环境默认关闭
  setting:
    enable-debug: false                # 生产环境关闭调试
    enable-document-manage: false
  basic:
    enable: ${KNIFE4J_BASIC_ENABLE:true}  # 生产环境建议开启 Basic 认证
    username: ${KNIFE4J_USERNAME:admin}
    password: ${KNIFE4J_PASSWORD:admin123}

logging:
  level:
    com.snrt.knowledgebase: INFO
    org.springframework.ai: WARN
    org.neo4j: WARN

server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 1073741824
      max-request-size: 1073741824
      enabled: true
      file-size-threshold: 0
  application:
    name: knowledge-base
  datasource:
    url: jdbc:postgresql://localhost:5432/knowledge_base
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

    # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      # password: redis123  # 如果Redis没有密码，请注释此行
      database: 0
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # RabbitMQ配置
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 5000
          multiplier: 2
          max-interval: 30000
        default-requeue-rejected: false
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: deepseek-r1:1.5b
          temperature: 0.7
      embedding:
        options:
          model: nomic-embed-text

    zhipuai:
      api-key: ${ZHIPUAI_API_KEY:2ed1fcc2d4cc4472811ecbbda85e2c07.Ryu8O8jAw14CZsta}
      chat:
        options:
          model: glm-4.7-flash
          temperature: 0.7
    vectorstore:
      pgvector:
        # 自动创建表（生产环境慎用）
        initialize-schema: true
        # 表名（默认就是 vector_store，可不配置）
        table-name: vector_store
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
        max-document-batch-size: 10000 # Optional: Maximum number of documents per batch

# 大模型提供商配置: zhipuai 或 ollama
chat:
  model:
    provider: ollama

# MinIO 配置
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket-name: knowledge-base

# springdoc-openapi 基础配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html       # 访问路径
    enabled: true
    operations-sorter: order     # 按 Knife4j 增强排序
    tags-sorter: alpha           # 标签按字母排序
    disable-swagger-default-url: true
    doc-expansion: none          # 默认折叠标签列表（none/list/full）
    default-models-expand-depth: 1  # 默认展开模型深度
    display-request-duration: true  # 显示请求耗时
    filter: true                    # 开启接口搜索过滤
    show-extensions: true           # 显示扩展信息
  api-docs:
    path: /v3/api-docs           # 文档接口地址
    enabled: true
  default-flat-param-object: true # GET 多参数自动展开（避免参数接收问题）
# Knife4j 增强配置
knife4j:
  enable: true                   # 开启增强（必须）
  setting:
    language: zh-CN              # 中文界面
    enable-swagger-models: false  # 显示数据模型
    enable-debug: true           # 开启在线调试
    enable-document-manage: false # 开启文档管理
    enable-reload-cache: true    # 开启缓存刷新
    enable-filter-multipart-api: true  # 过滤 multipart/form-data 类型
    enable-dynamic-parameter: true     # 开启动态参数调试
    enable-host: false                 # 禁用默认 host 显示
    enable-host-text: false            # 禁用 host 文本显示
  # 生产环境建议开启 Basic 认证
  basic:
    enable: false
    username: admin
    password: 123456



# 检索配置
retrieval:
  multi-retrieve:
    enabled: true
    rrf-k: 60
    vector-recall-multiplier: 2
    full-text-recall-multiplier: 1
  bm25:
    enabled: true
    k1: 1.2
    b: 0.75
    prefix-match: true
    expand-synonyms: false
    fuzzy-match: false
    require-all-terms: false
    use-normalization: true
  vector:
    similarity-threshold: 0.3
    default-top-k: 10



